services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15}
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-redis:7}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  init:
    build:
      context: .
      secrets:
        - npm_token
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    command: sh -c "cp -r /app/app/static/. /static/ && alembic upgrade head"
    user: root
    env_file: .env
    volumes:
      - portal_static:/static
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      secrets:
        - npm_token
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
      - portal_static:/app/app/static
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      secrets:
        - npm_token
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    command: celery -A app.infrastructure.celery_app worker -l info -c 4
    env_file: .env
    volumes:
      - .:/app
      - portal_static:/app/app/static
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      secrets:
        - npm_token
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    command: celery -A app.infrastructure.celery_app beat -l info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

secrets:
  # npm auth token for the frontend build, passed as a BuildKit secret (never a build arg/layer).
  # Sourced from the NPM_REGISTRY_TOKEN env var; empty/unset → public npm.
  npm_token:
    environment: NPM_REGISTRY_TOKEN

volumes:
  postgres_data:
  portal_static:
