services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portal}
      POSTGRES_DB: ${POSTGRES_DB:-portal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-portal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-redis:7}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  init:
    build:
      context: .
      secrets:
        - npm_token
        - npm_ca
        - apt_password
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
        PORTAL_UID: ${PORTAL_UID:-1000}
        PORTAL_GID: ${PORTAL_GID:-1000}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
        APT_SUITE: ${APT_SUITE:-}
        APT_COMPONENTS: ${APT_COMPONENTS:-main contrib}
        APT_REPO_HOST: ${APT_REPO_HOST:-}
        APT_REPO_USER: ${APT_REPO_USER:-token}
    command: sh -c "cp -r /app/app/static/. /static/ && alembic upgrade head"
    user: root
    env_file: .env
    volumes:
      - portal_static:/static
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      secrets:
        - npm_token
        - npm_ca
        - apt_password
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
        PORTAL_UID: ${PORTAL_UID:-1000}
        PORTAL_GID: ${PORTAL_GID:-1000}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
        APT_SUITE: ${APT_SUITE:-}
        APT_COMPONENTS: ${APT_COMPONENTS:-main contrib}
        APT_REPO_HOST: ${APT_REPO_HOST:-}
        APT_REPO_USER: ${APT_REPO_USER:-token}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
      - portal_static:/app/app/static
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      secrets:
        - npm_token
        - npm_ca
        - apt_password
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
        PORTAL_UID: ${PORTAL_UID:-1000}
        PORTAL_GID: ${PORTAL_GID:-1000}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
        APT_SUITE: ${APT_SUITE:-}
        APT_COMPONENTS: ${APT_COMPONENTS:-main contrib}
        APT_REPO_HOST: ${APT_REPO_HOST:-}
        APT_REPO_USER: ${APT_REPO_USER:-token}
    command: celery -A app.infrastructure.celery_app worker -l info -c 4
    env_file: .env
    volumes:
      - .:/app
      - portal_static:/app/app/static
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      secrets:
        - npm_token
        - npm_ca
        - apt_password
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
        PORTAL_UID: ${PORTAL_UID:-1000}
        PORTAL_GID: ${PORTAL_GID:-1000}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
        APT_SUITE: ${APT_SUITE:-}
        APT_COMPONENTS: ${APT_COMPONENTS:-main contrib}
        APT_REPO_HOST: ${APT_REPO_HOST:-}
        APT_REPO_USER: ${APT_REPO_USER:-token}
    command: celery -A app.infrastructure.celery_app beat -l info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

secrets:
  # npm auth token for the frontend build, passed as a BuildKit secret (never a build arg/layer).
  # Sourced from the NPM_REGISTRY_TOKEN env var; empty/unset → public npm.
  npm_token:
    environment: NPM_REGISTRY_TOKEN
  # CA certificate (PEM) for a registry behind an internal/self-signed CA. Point NPM_CA_CERT_FILE
  # at the cert; defaults to /dev/null (empty → npm uses the default CA bundle).
  npm_ca:
    file: ${NPM_CA_CERT_FILE:-/dev/null}
  # Password/token for a local apt mirror that needs auth (used only when APT_MIRROR + APT_REPO_HOST
  # are set). Sourced from the APT_REPO_PASSWORD env var; empty/unset → no apt auth file is written.
  apt_password:
    environment: APT_REPO_PASSWORD

volumes:
  postgres_data:
  portal_static:
