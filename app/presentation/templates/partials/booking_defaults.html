<div id="booking-defaults" class="border-t border-gray-800 pt-6">
    <p class="text-xs text-gray-500 uppercase tracking-widest mb-4">Booking defaults</p>

    {% if defaults_saved %}
    <div class="px-3 py-2 rounded bg-green-900/50 border border-green-700 text-green-300 text-xs mb-4">
        Booking defaults saved.
    </div>
    {% endif %}

    <form
        hx-patch="/profile/defaults"
        hx-target="#booking-defaults"
        hx-swap="outerHTML"
        class="space-y-4"
    >
        <div>
            <label class="block text-xs text-gray-500 mb-1.5" for="default_image_id">Image</label>
            <select
                id="default_image_id"
                name="default_image_id"
                class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-green-600"
            >
                <option value="" {% if not current_user.default_image_id %}selected{% endif %}>No preference</option>
                {% for img in vm_images %}
                <option value="{{ img.id }}" {% if img.id == current_user.default_image_id %}selected{% endif %}>{{ img.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1.5" for="default_hw_config_id">Hardware</label>
            <select
                id="default_hw_config_id"
                name="default_hw_config_id"
                class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-green-600"
            >
                <option value="" {% if not current_user.default_hw_config_id %}selected{% endif %}>No preference</option>
                {% for hw in hw_configs %}
                <option value="{{ hw.id }}" {% if hw.id == current_user.default_hw_config_id %}selected{% endif %}>{{ hw.name }} ({{ hw.cpus }} CPU / {{ hw.memory_mb // 1024 }} GB RAM / {{ hw.disk_mb // 1024 }} GB {{ hw.drive_type }})</option>
                {% endfor %}
            </select>
        </div>
        <button
            type="submit"
            class="px-4 py-2 bg-green-700 hover:bg-green-600 text-green-100 text-sm rounded transition-colors"
        >
            Save
        </button>
    </form>
</div>
