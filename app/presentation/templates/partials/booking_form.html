<form
    hx-post="/bookings"
    hx-target="#bookings-list"
    hx-swap="afterbegin"
    hx-on::after-request="document.getElementById('empty-row')?.remove()"
    class="flex items-end gap-4"
>
    <div class="flex flex-col gap-1">
        <label for="ttl_hours" class="text-xs text-gray-500">Duration</label>
        <select
            id="ttl_hours"
            name="ttl_hours"
            class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-gray-100 focus:outline-none focus:border-green-500 text-sm"
        >
            <option value="1">1 hour</option>
            <option value="4" selected>4 hours</option>
            <option value="8">8 hours</option>
            <option value="24">24 hours</option>
        </select>
    </div>
    <button
        type="submit"
        class="bg-green-600 hover:bg-green-500 text-white text-sm px-5 py-2 rounded transition-colors"
    >
        Book VM
    </button>
</form>
