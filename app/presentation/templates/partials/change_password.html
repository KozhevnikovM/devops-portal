<div id="change-password" class="border-t border-gray-800 pt-6">
    <p class="text-xs text-gray-500 uppercase tracking-widest mb-4">Change Password</p>

    {% if password_saved %}
    <div class="px-3 py-2 rounded bg-green-900/50 border border-green-700 text-green-300 text-xs mb-4">
        Password changed. All other sessions have been signed out.
    </div>
    {% endif %}

    {% if password_error %}
    <div class="px-3 py-2 rounded bg-red-900/50 border border-red-700 text-red-300 text-xs mb-4">
        {{ password_error }}
    </div>
    {% endif %}

    <form
        hx-post="/profile/password"
        hx-target="#change-password"
        hx-swap="outerHTML"
        class="space-y-4"
    >
        <div>
            <label class="block text-xs text-gray-500 mb-1.5" for="current_password">Current password</label>
            <input
                id="current_password"
                name="current_password"
                type="password"
                required
                autocomplete="current-password"
                class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-green-600"
            >
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1.5" for="new_password">New password</label>
            <input
                id="new_password"
                name="new_password"
                type="password"
                required
                minlength="8"
                autocomplete="new-password"
                class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-green-600"
            >
        </div>
        <button
            type="submit"
            class="px-4 py-2 bg-green-700 hover:bg-green-600 text-green-100 text-sm rounded transition-colors"
        >
            Save
        </button>
    </form>
</div>
