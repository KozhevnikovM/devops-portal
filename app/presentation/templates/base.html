<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DevOps Portal{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/tailwind.css?v=2">
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/htmx-sse.js"></script>
</head>
<body class="h-full text-gray-100 font-mono">
    <header class="border-b border-gray-800 px-6 py-4 flex items-center gap-3">
        <span class="text-green-400 text-lg font-bold">▶ DevOps Portal</span>
        <span class="text-gray-600 text-sm">/ VM Booking</span>
        {% if current_user %}
        <div class="ml-auto flex items-center gap-4">
            <span class="text-gray-400 text-sm">{{ current_user.username }}</span>
            <form method="post" action="/auth/logout" class="inline">
                <button type="submit" class="text-xs px-3 py-1 rounded bg-gray-800 text-gray-400 border border-gray-700 hover:bg-gray-700 transition-colors">
                    Sign out
                </button>
            </form>
        </div>
        {% endif %}
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
