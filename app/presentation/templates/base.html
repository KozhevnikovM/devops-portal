<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DevOps Portal{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/tailwind.css?v=2">
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/htmx-sse.js"></script>
    <script>
      (function () {
        var hovered = new Set();
        document.addEventListener('mouseover', function (e) {
          var tr = e.target.closest('tr[id^="booking-"]');
          if (tr) hovered.add(tr.id);
        });
        document.addEventListener('mouseout', function (e) {
          var tr = e.target.closest('tr[id^="booking-"]');
          if (tr && !tr.contains(e.relatedTarget)) hovered.delete(tr.id);
        });
        window._bookingHovered = function (id) { return hovered.has('booking-' + id); };
      })();
    </script>
</head>
<body class="h-full text-gray-100 font-mono">
    <header class="border-b border-gray-800 px-6 py-4 flex items-center gap-3">
        <a href="/" class="text-green-400 text-lg font-bold hover:text-green-300 transition-colors">▶ DevOps Portal</a>
        {% if current_user %}
        <nav class="flex items-center gap-1 ml-6 text-sm">
            <a href="/book/vm" class="px-3 py-1 rounded transition-colors {% if active_nav == 'vm' %}bg-gray-800 text-green-400{% else %}text-gray-500 hover:text-gray-300{% endif %}">Virtual Machines</a>
            <a href="/book/namespace" class="px-3 py-1 rounded transition-colors {% if active_nav == 'namespace' %}bg-gray-800 text-green-400{% else %}text-gray-500 hover:text-gray-300{% endif %}">Namespaces</a>
            <span class="px-3 py-1 rounded text-gray-600 cursor-not-allowed" title="Coming soon">Environment</span>
        </nav>
        <details class="relative ml-auto group">
            <summary class="list-none cursor-pointer px-2 py-1 rounded text-gray-400 hover:text-gray-200 hover:bg-gray-800 transition-colors select-none text-lg leading-none">☰</summary>
            <div class="absolute right-0 top-full mt-1 w-44 bg-gray-900 border border-gray-700 rounded shadow-lg z-50 py-1">
                <div class="px-4 py-2 text-xs text-gray-500 border-b border-gray-800">{{ current_user.username }}</div>
                {% if current_user.role == 'admin' %}
                <a href="/admin/users" class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-800 transition-colors">Users</a>
                <a href="/admin/catalog" class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-800 transition-colors">Catalog</a>
                {% endif %}
                <a href="/profile" class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-800 transition-colors">Profile</a>
                <div class="border-t border-gray-800 mt-1 pt-1">
                    <form method="post" action="/auth/logout">
                        <button type="submit" class="w-full text-left px-4 py-2 text-sm text-gray-300 hover:bg-gray-800 transition-colors">Sign out</button>
                    </form>
                </div>
            </div>
        </details>
        {% endif %}
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
