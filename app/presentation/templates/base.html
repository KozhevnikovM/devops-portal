<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DevOps Portal{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <style>
        .status-PENDING      { @apply bg-yellow-900 text-yellow-300 border border-yellow-700; }
        .status-PROVISIONING { @apply bg-blue-900 text-blue-300 border border-blue-700; }
        .status-READY        { @apply bg-green-900 text-green-300 border border-green-700; }
        .status-FAILED       { @apply bg-red-900 text-red-300 border border-red-700; }
    </style>
</head>
<body class="h-full text-gray-100 font-mono">
    <header class="border-b border-gray-800 px-6 py-4 flex items-center gap-3">
        <span class="text-green-400 text-lg font-bold">▶ DevOps Portal</span>
        <span class="text-gray-600 text-sm">/ VM Booking</span>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
