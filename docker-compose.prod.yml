# Production compose file.
# Use in place of docker-compose.yml — not as an overlay on top of it.
# Differences from the dev file:
#   - app:    no --reload; multi-worker (APP_WORKERS, default 2); no .:/app bind-mount
#   - worker: no .:/app bind-mount
#   - beat:   no .:/app bind-mount
#   - app / worker / beat: restart: unless-stopped
#   - postgres / redis: ports not exposed to the host

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portal}
      POSTGRES_DB: ${POSTGRES_DB:-portal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-portal}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  init:
    build:
      context: .
      secrets:
        - npm_token
        - npm_ca
        - apt_password
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
        PORTAL_UID: ${PORTAL_UID:-1000}
        PORTAL_GID: ${PORTAL_GID:-1000}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
        APT_SUITE: ${APT_SUITE:-}
        APT_COMPONENTS: ${APT_COMPONENTS:-main contrib}
        APT_REPO_HOST: ${APT_REPO_HOST:-}
        APT_REPO_USER: ${APT_REPO_USER:-token}
        ANSIBLE_COLLECTIONS_REQUIREMENTS: ${ANSIBLE_COLLECTIONS_REQUIREMENTS:-ansible/requirements.yml}
    command: sh -c "cp -r /app/app/static/. /static/ && alembic upgrade head"
    user: root
    env_file: .env
    volumes:
      - portal_static:/static
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      secrets:
        - npm_token
        - npm_ca
        - apt_password
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
        PORTAL_UID: ${PORTAL_UID:-1000}
        PORTAL_GID: ${PORTAL_GID:-1000}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
        APT_SUITE: ${APT_SUITE:-}
        APT_COMPONENTS: ${APT_COMPONENTS:-main contrib}
        APT_REPO_HOST: ${APT_REPO_HOST:-}
        APT_REPO_USER: ${APT_REPO_USER:-token}
        ANSIBLE_COLLECTIONS_REQUIREMENTS: ${ANSIBLE_COLLECTIONS_REQUIREMENTS:-ansible/requirements.yml}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${APP_WORKERS:-2}
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - portal_static:/app/app/static
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      secrets:
        - npm_token
        - npm_ca
        - apt_password
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
        PORTAL_UID: ${PORTAL_UID:-1000}
        PORTAL_GID: ${PORTAL_GID:-1000}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
        APT_SUITE: ${APT_SUITE:-}
        APT_COMPONENTS: ${APT_COMPONENTS:-main contrib}
        APT_REPO_HOST: ${APT_REPO_HOST:-}
        APT_REPO_USER: ${APT_REPO_USER:-token}
        ANSIBLE_COLLECTIONS_REQUIREMENTS: ${ANSIBLE_COLLECTIONS_REQUIREMENTS:-ansible/requirements.yml}
    entrypoint: ["/app/docker/entrypoint-worker.sh"]
    command: celery -A app.infrastructure.celery_app worker -l info -c 4
    env_file: .env
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: .
      secrets:
        - npm_token
        - npm_ca
        - apt_password
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        TERRAFORM_IMAGE: ${TERRAFORM_IMAGE:-hashicorp/terraform:1.9}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
        PORTAL_UID: ${PORTAL_UID:-1000}
        PORTAL_GID: ${PORTAL_GID:-1000}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
        APT_SUITE: ${APT_SUITE:-}
        APT_COMPONENTS: ${APT_COMPONENTS:-main contrib}
        APT_REPO_HOST: ${APT_REPO_HOST:-}
        APT_REPO_USER: ${APT_REPO_USER:-token}
        ANSIBLE_COLLECTIONS_REQUIREMENTS: ${ANSIBLE_COLLECTIONS_REQUIREMENTS:-ansible/requirements.yml}
    command: celery -A app.infrastructure.celery_app beat -l info
    env_file: .env
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

secrets:
  npm_token:
    environment: NPM_REGISTRY_TOKEN
  npm_ca:
    file: ${NPM_CA_CERT_FILE:-/dev/null}
  apt_password:
    environment: APT_REPO_PASSWORD

volumes:
  postgres_data:
  portal_static:
