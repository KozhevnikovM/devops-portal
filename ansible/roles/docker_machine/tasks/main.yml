---
# MOCK role — demo/testing only. Real roles are written and supplied by the admin (placed under
# ANSIBLE_ROLES_PATH); the portal ships no opinionated configuration of its own.
- name: docker-machine (mock) — report what a real role would do
  ansible.builtin.debug:
    msg: "Mock docker-machine role applied (a real role would install Docker). message={{ role_message | default('—') }}"

- name: Drop a marker so the run is observable
  ansible.builtin.copy:
    dest: /tmp/portal-role-docker_machine.applied
    content: "applied by the portal mock docker-machine role\n"
    mode: "0644"
